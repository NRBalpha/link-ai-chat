title: Link AI Chat
description: AI-powered chat application with file analysis using Flask and Google Gemini
url: "https://nrbalpha.github.io"
baseurl: "/link-ai-chat"

# Build settings
markdown: kramdown
highlighter: rouge

# Exclude files
exclude:
  - README.md
  - PROJECT_README.md
  - requirements.txt
  - Procfile
  - chat.py
  - run_dev.py
  - .env
  - .env.example
  - .gitignore
  - LICENSE
  - DEPLOYMENT.md
  - __pycache__/
  - .venv/
  - static/
  - templates/
  - docs/

# Include files
include:
  - index.html
  - style.css
  - script.js
  - test.html 