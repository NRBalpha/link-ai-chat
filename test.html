<!DOCTYPE html>
<html>
<head>
    <title>Test - Link AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { font-size: 3em; margin-bottom: 20px; }
        p { font-size: 1.2em; line-height: 1.6; }
        .button {
            background: #667eea;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            margin: 20px;
            text-decoration: none;
            display: inline-block;
        }
        .button:hover {
            background: #5a6fd8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Link AI is Loading!</h1>
        <p>✅ GitHub Pages is working!</p>
        <p>🔧 Setting up your AI chat application...</p>
        <p>⏰ This may take a few minutes to fully deploy.</p>
        
        <a href="index.html" class="button">🔗 Try Link AI Chat</a>
        
        <p><small>If the main app doesn't load, please wait 5-10 minutes for GitHub Pages to fully deploy.</small></p>
    </div>
    
    <script>
        // Auto-redirect to main app after 10 seconds
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 10000);
    </script>
</body>
</html>
