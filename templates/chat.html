<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENKU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" id="hljs-dark">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" id="hljs-light" disabled>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/css.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/xml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/typescript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #141414;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size:
                50px 50px,
                50px 50px,
                10px 10px,
                10px 10px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .sidebar, .main { position: relative; z-index: 1; }

        /* ── Sidebar ── */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: rgba(23, 23, 23, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2a2a;
            transition: margin-left 0.3s ease;
        }
        .sidebar.hidden { margin-left: -260px; }
        .sidebar-header {
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .new-chat-btn {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: transparent;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .new-chat-btn:hover { background: #2a2a2a; }
        .new-chat-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
        .sidebar-search { padding: 0 12px 8px; }
        .sidebar-search input {
            width: 100%;
            padding: 8px 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 13px;
            outline: none;
        }
        .sidebar-search input:focus { border-color: #555; }
        .sidebar-search input::placeholder { color: #666; }
        .chat-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
        .chat-list::-webkit-scrollbar { width: 4px; }
        .chat-list::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .date-group-label {
            padding: 8px 8px 4px;
            font-size: 11px;
            font-weight: 500;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .chat-item:hover { background: #2a2a2a; }
        .chat-item.active { background: #2a2a2a; }
        .chat-item-title {
            flex: 1;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ccc;
        }
        .chat-item.active .chat-item-title { color: #fff; }
        .chat-item-actions { display: none; gap: 2px; margin-left: 4px; }
        .chat-item:hover .chat-item-actions { display: flex; }
        .chat-item-actions button {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }
        .chat-item-actions button:hover { color: #fff; background: #3a3a3a; }
        .chat-item-actions svg { width: 14px; height: 14px; }
        .rename-input {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #555;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
            padding: 2px 6px;
            outline: none;
        }

        /* ── Main Area ── */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .topbar {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
        }
        .topbar-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
        }
        .topbar-btn:hover { background: #2a2a2a; color: #fff; }
        .topbar-btn svg { width: 20px; height: 20px; }

        .topbar-title-area {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 0;
        }
        .topbar-title {
            font-size: 14px;
            font-weight: 500;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .topbar-rename-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 3px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            opacity: 0;
            transition: opacity 0.15s;
            flex-shrink: 0;
        }
        .topbar-title-area:hover .topbar-rename-btn { opacity: 1; }
        .topbar-rename-btn:hover { color: #ccc; background: #333; }
        .topbar-rename-btn svg { width: 14px; height: 14px; }
        .topbar-rename-input {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            background: #2a2a2a;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 2px 8px;
            outline: none;
            flex: 1;
            min-width: 0;
            font-family: 'Inter', sans-serif;
        }

        .model-badge {
            font-size: 11px;
            color: #777;
            background: #2a2a2a;
            padding: 3px 8px;
            border-radius: 12px;
            flex-shrink: 0;
        }
        .lang-select {
            background: #2a2a2a;
            color: #ccc;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            outline: none;
            flex-shrink: 0;
        }
        .lang-select:hover { border-color: #555; }
        .lang-select option { background: #2a2a2a; color: #ccc; }

        /* ── Messages ── */
        .messages { flex: 1; overflow-y: auto; padding: 20px 0; }
        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .message-row {
            max-width: 720px;
            margin: 0 auto;
            padding: 6px 24px;
            display: flex;
            flex-direction: column;
        }
        .message-row.user { align-items: flex-end; }
        .message-row.assistant { align-items: flex-start; }
        .message-sender {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            padding: 0 4px;
        }
        .message-row.user .message-sender { color: #8bb3e6; }
        .message-row.assistant .message-sender { color: #90c790; }
        .message-body {
            font-size: 14px;
            line-height: 1.7;
            max-width: 80%;
        }
        .message-row.user .message-body {
            background: #6366f1;
            color: #fff;
            padding: 12px 16px;
            border-radius: 16px;
            border-bottom-right-radius: 4px;
        }
        .message-row.assistant .message-body {
            color: #d4d4d4;
        }
        .message-actions {
            display: flex;
            gap: 4px;
            margin-top: 4px;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .message-row:hover .message-actions { opacity: 1; }
        .message-row.user .message-actions { justify-content: flex-end; }
        .msg-action-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }
        .msg-action-btn:hover { color: #ccc; background: #2a2a2a; }
        .msg-action-btn svg { width: 15px; height: 15px; }
        .edit-textarea {
            width: 100%;
            max-width: 80%;
            background: #2a2a2a;
            border: 1px solid #555;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            padding: 10px 14px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }
        .edit-actions { display: flex; gap: 6px; margin-top: 6px; }
        .edit-actions button {
            padding: 5px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            border: none;
        }
        .edit-save { background: #6366f1; color: #fff; }
        .edit-save:hover { background: #5558e6; }
        .edit-cancel { background: #333; color: #ccc; }
        .edit-cancel:hover { background: #444; }

        /* ── Markdown in bot messages ── */
        .message-row.assistant .message-body h1,
        .message-row.assistant .message-body h2,
        .message-row.assistant .message-body h3 {
            margin: 0.8em 0 0.4em;
            font-weight: 600;
        }
        .message-row.assistant .message-body h1 { font-size: 1.25em; }
        .message-row.assistant .message-body h2 { font-size: 1.12em; }
        .message-row.assistant .message-body h3 { font-size: 1em; }
        .message-row.assistant .message-body p { margin: 0.4em 0; }
        .message-row.assistant .message-body ul,
        .message-row.assistant .message-body ol { margin: 0.4em 0; padding-left: 1.4em; }
        .message-row.assistant .message-body li { margin: 0.2em 0; }
        .message-row.assistant .message-body code {
            background: rgba(255,255,255,0.08);
            padding: 2px 5px;
            border-radius: 4px;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 0.88em;
        }
        .message-row.assistant .message-body pre {
            background: #0f172a;
            border-radius: 8px;
            padding: 14px;
            margin: 0.6em 0;
            overflow-x: auto;
            position: relative;
        }
        .message-row.assistant .message-body pre code {
            background: transparent;
            padding: 0;
            font-size: 0.85em;
            line-height: 1.5;
        }
        .code-copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #888;
            border-radius: 4px;
            padding: 4px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .code-copy-btn svg { width: 14px; height: 14px; }
        pre:hover .code-copy-btn { opacity: 1; }
        .message-row.assistant .message-body strong { font-weight: 600; }
        .message-row.assistant .message-body blockquote {
            border-left: 3px solid #444;
            padding-left: 12px;
            margin: 0.4em 0;
            color: #94a3b8;
        }
        .message-row.assistant .message-body a { color: #818cf8; }
        .message-row.assistant .message-body table { border-collapse: collapse; margin: 0.4em 0; width: 100%; }
        .message-row.assistant .message-body th,
        .message-row.assistant .message-body td {
            border: 1px solid #334155;
            padding: 6px 10px;
            text-align: left;
            font-size: 13px;
        }
        .message-row.assistant .message-body th { background: #1e293b; }

        /* ── Loading animation ── */
        .loading-container {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 0;
            align-self: flex-start;
            animation: fadeSlideIn 0.3s ease-out;
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading-container img {
            width: 72px;
            height: 72px;
            object-fit: contain;
        }
        .loading-text {
            font-size: 15px;
            color: #818cf8;
            font-weight: 500;
            transition: opacity 0.2s ease;
        }

        /* ── Welcome ── */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #666;
        }
        .welcome h2 { font-size: 22px; font-weight: 500; color: #ccc; }
        .welcome p { font-size: 14px; }

        /* ── Input ── */
        .input-area {
            padding: 12px 24px 20px;
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
        }
        .input-box {
            display: flex;
            flex-direction: column;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 16px;
            padding: 0;
            transition: border-color 0.15s;
            overflow: hidden;
        }
        .input-box:focus-within { border-color: #555; }
        .input-box textarea {
            width: 100%;
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            resize: none;
            min-height: 44px;
            max-height: 200px;
            outline: none;
            line-height: 1.6;
            padding: 14px 16px 4px;
            box-sizing: border-box;
        }
        .input-box textarea::placeholder { color: #666; }
        .input-actions {
            display: flex;
            align-items: center;
            padding: 4px 8px 8px;
            gap: 4px;
        }
        .input-actions-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .disclaimer {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin: 6px 0 0 0;
            padding: 0;
        }
        .input-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }
        .input-btn:hover { color: #ccc; }
        .input-btn.send-btn { color: #999; }
        .input-btn.send-btn:hover { color: #ccc; }
        .input-btn.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .input-btn svg { width: 18px; height: 18px; }
        .input-btn.voice-btn { color: #999; }
        .input-btn.voice-btn:hover { color: #ccc; }
        .input-btn.voice-btn.recording { color: #ef4444; animation: pulse-rec 1.2s ease-in-out infinite; }
        @keyframes pulse-rec {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        #filePreview {
            margin-bottom: 6px;
            padding: 6px 10px;
            background: #333;
            border-radius: 6px;
            display: none;
            font-size: 13px;
        }
        .error-msg {
            background: #3a1a1a;
            border: 1px solid #5a2a2a;
            color: #f88;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            max-width: 80%;
        }

        /* ── Attach menu ── */
        .attach-wrap { position: relative; }
        .attach-menu {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 0;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            padding: 4px;
            display: none;
            flex-direction: column;
            min-width: 210px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            z-index: 10;
        }
        .attach-menu.open { display: flex; }
        .attach-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border: none;
            background: none;
            color: #d4d4d4;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.12s;
            white-space: nowrap;
        }
        .attach-menu-item:hover { background: #3a3a3a; }
        .attach-menu-item svg { width: 18px; height: 18px; flex-shrink: 0; }

        /* light theme */
        body.light-theme .attach-menu { background: #fff; border-color: #ddd; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        body.light-theme .attach-menu-item { color: #333; }
        body.light-theme .attach-menu-item:hover { background: #f0f0f0; }

        /* ═══════════════════════════════════════════ */
        /* ── Light Theme ── */
        /* ═══════════════════════════════════════════ */
        body.light-theme {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 50%, #f0f0f0 100%);
            color: #1a1a1a;
        }
        body.light-theme::before {
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.08) 1px, transparent 1px),
                linear-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
            opacity: 0.4;
        }

        /* Sidebar */
        body.light-theme .sidebar { background: rgba(255, 255, 255, 0.85); border-right-color: #e5e5e5; }
        body.light-theme .new-chat-btn { color: #333; border-color: #ddd; }
        body.light-theme .new-chat-btn:hover { background: #f0f0f0; }
        body.light-theme .sidebar-search input {
            background: #f0f0f0; border-color: #ddd; color: #333;
        }
        body.light-theme .sidebar-search input::placeholder { color: #999; }
        body.light-theme .chat-list::-webkit-scrollbar-thumb { background: #ccc; }
        body.light-theme .date-group-label { color: #888; }
        body.light-theme .chat-item:hover { background: #f0f0f0; }
        body.light-theme .chat-item.active { background: #e8e8e8; }
        body.light-theme .chat-item-title { color: #444; }
        body.light-theme .chat-item.active .chat-item-title { color: #111; }
        body.light-theme .chat-item-actions button { color: #888; }
        body.light-theme .chat-item-actions button:hover { color: #333; background: #e0e0e0; }
        body.light-theme .rename-input { background: #fff; border-color: #ccc; color: #333; }

        /* Topbar */
        body.light-theme .topbar { border-bottom-color: #e5e5e5; }
        body.light-theme .topbar-btn { color: #666; }
        body.light-theme .topbar-btn:hover { background: #eee; color: #333; }
        body.light-theme .topbar-title { color: #333; }
        body.light-theme .topbar-rename-btn { color: #999; }
        body.light-theme .topbar-rename-btn:hover { color: #333; background: #e8e8e8; }
        body.light-theme .topbar-rename-input { background: #fff; border-color: #ccc; color: #333; }
        body.light-theme .model-badge { background: #e8e8e8; color: #666; }
        body.light-theme .lang-select { background: #fff; color: #333; border-color: #ccc; }
        body.light-theme .lang-select:hover { border-color: #aaa; }
        body.light-theme .lang-select option { background: #fff; color: #333; }

        /* Messages */
        body.light-theme .messages::-webkit-scrollbar-thumb { background: #ccc; }
        body.light-theme .message-row.user .message-sender { color: #6366f1; }
        body.light-theme .message-row.assistant .message-sender { color: #16a34a; }
        body.light-theme .message-row.user .message-body {
            background: #6366f1;
            color: #fff;
        }
        body.light-theme .message-row.assistant .message-body {
            color: #1a1a1a;
        }
        body.light-theme .message-row.assistant .message-body code {
            background: rgba(0,0,0,0.06);
        }
        body.light-theme .message-row.assistant .message-body pre {
            background: #1e293b;
            color: #e2e8f0;
        }
        body.light-theme .message-row.assistant .message-body pre code {
            color: #e2e8f0;
        }
        body.light-theme .message-row.assistant .message-body blockquote { border-left-color: #ccc; color: #666; }
        body.light-theme .message-row.assistant .message-body a { color: #6366f1; }
        body.light-theme .message-row.assistant .message-body th,
        body.light-theme .message-row.assistant .message-body td { border-color: #ddd; }
        body.light-theme .message-row.assistant .message-body th { background: #f0f0f0; }
        body.light-theme .msg-action-btn { color: #aaa; }
        body.light-theme .msg-action-btn:hover { color: #333; background: #e8e8e8; }

        /* ── Mobile ── */
        @media (max-width: 768px) {

</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar hidden" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="createNewChat()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                New chat
            </button>
        </div>
        <div class="sidebar-search">
            <input type="text" placeholder="Search chats..." id="searchInput" oninput="renderChatList()">
        </div>
        <div class="chat-list" id="chatList"></div>
    </aside>

    <!-- Mobile overlay -->
    <div class="overlay" id="overlay" onclick="closeSidebarMobile()"></div>

    <!-- Main -->
    <div class="main">
        <div class="topbar">
            <button class="topbar-btn" onclick="toggleSidebar()" title="Toggle sidebar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <div class="topbar-title-area" id="topbarTitleArea">
                <span class="topbar-title" id="topbarTitle">New chat</span>
                <button class="topbar-rename-btn" onclick="startTopbarRename()" title="Rename chat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
            </div>
            <span class="model-badge">Gemini</span>
            <select class="lang-select" id="langSelect" onchange="changeLanguage(this.value)" title="Response language">
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="so">Af-Soomaali</option>
                <option value="om">Afaan Oromoo</option>
                <option value="ti">ትግርኛ</option>
            </select>
            <button class="topbar-btn" onclick="toggleTheme()" title="Toggle theme">
                <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button class="topbar-btn" onclick="window.location.href='/welcome'" title="Home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </button>
        </div>

        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <h2>ENKU</h2>
                <p>How can I help you today?</p>
            </div>
        </div>

        <div class="input-area">
            <div id="filePreview"></div>
            <div class="input-box">
                <input type="file" id="fileInput" style="display:none" accept="image/*,.txt,.py,.js,.html,.css,.json,.xml,.csv,.md,.ts">
                <textarea id="messageInput" placeholder="Message ENKU..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                <div class="input-actions">
                    <div class="attach-wrap">
                        <button class="input-btn" onclick="toggleAttachMenu()" title="Attach">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                        <div class="attach-menu" id="attachMenu">
                            <button class="attach-menu-item" onclick="pickFile()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                                Add files or photos
                            </button>
                            <button class="attach-menu-item" onclick="takePhoto()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
                                Take a photo
                            </button>
                            <button class="attach-menu-item" onclick="takeScreenshot()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="3"/></svg>
                                Take a screenshot
                            </button>
                        </div>
                    </div>
                    <div class="input-actions-right">
                        <button class="input-btn voice-btn" id="voiceBtn" onclick="toggleVoice()" title="Voice input">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="1" width="6" height="12" rx="3"/><path d="M19 10v1a7 7 0 01-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                        </button>
                        <button class="input-btn send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                        </button>
                    </div>
                </div>
            </div>
            <p class="disclaimer" id="disclaimer">ENKU is AI and can make mistakes. Please double-check responses.</p>
        </div>
    </div>

    <!-- Firebase (kept for auth compatibility) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="{{ url_for('static', filename='firebase-config.js') }}"></script>

    <script>
    // ── State ──
    const auth = firebase.auth();
    let allChats = JSON.parse(localStorage.getItem('linkAiChats') || '[]');
    let activeChatId = null;
    let selectedFile = null;

    const messagesEl = document.getElementById('messages');
    const welcomeEl = document.getElementById('welcome');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');
    const filePreview = document.getElementById('filePreview');
    const chatListEl = document.getElementById('chatList');
    const searchInput = document.getElementById('searchInput');
    const topbarTitle = document.getElementById('topbarTitle');
    const topbarTitleArea = document.getElementById('topbarTitleArea');
    const langSelect = document.getElementById('langSelect');

    // ── Language / i18n ──
    let currentLang = localStorage.getItem('linkAiLang') || 'am';
    langSelect.value = currentLang;

    const UI_STRINGS = {
        en: {
            newChat: 'New chat', searchChats: 'Search chats...', welcomeTitle: 'ENKU',
            welcomeSub: 'How can I help you today?', placeholder: 'Message ENKU...',
            addFiles: 'Add files or photos', takePhoto: 'Take a photo', takeScreenshot: 'Take a screenshot',
            today: 'Today', yesterday: 'Yesterday', noChats: 'No chats yet',
            you: 'You', linkAi: 'ENKU', capture: 'Capture', cancel: 'Cancel',
            saveSubmit: 'Save & Submit', listening: 'Listening...',
            disclaimer: 'ENKU is AI and can make mistakes. Please double-check responses.',
        },
        am: {
            newChat: 'አዲስ ውይይት', searchChats: 'ውይይቶችን ፈልግ...', welcomeTitle: 'እንቁ',
            welcomeSub: 'ዛሬ እንዴት ልረዳዎት?', placeholder: 'ለENKU መልእክት ላክ...',
            addFiles: 'ፋይሎች ወይም ፎቶዎች ያክሉ', takePhoto: 'ፎቶ ያንሱ', takeScreenshot: 'ቅጽበታዊ ገጽ እይታ',
            today: 'ዛሬ', yesterday: 'ትላንት', noChats: 'ውይይቶች የሉም',
            you: 'እርስዎ', linkAi: 'እንቁ', capture: 'ቀረጻ', cancel: 'ሰርዝ',
            saveSubmit: 'አስቀምጥ እና ላክ', listening: 'በማዳመጥ ላይ...',
            disclaimer: 'ENKU AI ነው እና ስህተት ሊሠራ ይችላል። እባክዎ መልሶችን ደግመው ያረጋግጡ።',
        },
        so: {
            newChat: 'Sheeko cusub', searchChats: 'Raadi...', welcomeTitle: 'Luul',
            welcomeSub: 'Maanta sideen kugu caawin karaa?', placeholder: 'Fariinta ENKU...',
            addFiles: 'Kudar faylal ama sawirro', takePhoto: 'Sawir qaad', takeScreenshot: 'Sawir shaashadda',
            today: 'Maanta', yesterday: 'Shalay', noChats: 'Sheeko ma jirto',
            you: 'Adiga', linkAi: 'Luul', capture: 'Qaad', cancel: 'Jooji',
            saveSubmit: 'Keydi oo dir', listening: 'Dhageysanayaa...',
            disclaimer: 'ENKU waa AI wuxuuna samayn karaa qalado. Fadlan hubi jawaabaha.',
        },
        om: {
            newChat: 'Haasaa haaraa', searchChats: 'Barbaadi...', welcomeTitle: 'Inqu',
            welcomeSub: 'Har\'a maaliin si gargaaruu?', placeholder: 'Ergaa gara ENKU...',
            addFiles: 'Faayilii ykn suuraa dabaluu', takePhoto: 'Suuraa kaasuu', takeScreenshot: 'Iskiriinshootii',
            today: 'Har\'a', yesterday: 'Kaleessa', noChats: 'Haasaan hin jiru',
            you: 'Ati', linkAi: 'Inqu', capture: 'Kaasuu', cancel: 'Haquu',
            saveSubmit: 'Olkaa\'ii fi ergi', listening: 'Dhaggeeffachaa jira...',
            disclaimer: 'ENKU AI dha, dogoggora hojjechuu danda\'a. Maaloo deebii irra deebi\'ii mirkaneeffadhaa.',
        },
        ti: {
            newChat: 'ሓድሽ ዕላል', searchChats: 'ድለ...', welcomeTitle: 'እንቁ',
            welcomeSub: 'ሎሚ ብኸመይ ክሕግዘካ?', placeholder: 'ንእንቁ መልእኽቲ ስደድ...',
            addFiles: 'ፋይላት ወይ ስእልታት ወስኽ', takePhoto: 'ስእሊ ውሰድ', takeScreenshot: 'ስክሪንሾት',
            today: 'ሎሚ', yesterday: 'ትማሊ', noChats: 'ዕላል የለን',
            you: 'ንስኻ', linkAi: 'እንቁ', capture: 'ቅረጽ', cancel: 'ሰርዝ',
            saveSubmit: 'ዓቅብ እሞ ስደድ', listening: 'ይሰምዕ ኣሎ...',
            disclaimer: 'እንቁ AI እዩ ጌጋ ክገብር ይኽእል። በጃኹም መልስታት ደጊምኩም ኣረጋግጹ።',
        },
    };

    function t(key) {
        return (UI_STRINGS[currentLang] || UI_STRINGS['en'])[key] || UI_STRINGS['en'][key] || key;
    }

    function changeLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('linkAiLang', lang);
        applyLanguage();
    }

    function applyLanguage() {
        // Update all UI text
        document.querySelector('.new-chat-btn').innerHTML =
            `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> ${t('newChat')}`;
        searchInput.placeholder = t('searchChats');
        welcomeEl.querySelector('h2').textContent = t('welcomeTitle');
        welcomeEl.querySelector('p').textContent = t('welcomeSub');
        messageInput.placeholder = t('placeholder');
        // Attach menu items
        const menuItems = document.querySelectorAll('.attach-menu-item');
        if (menuItems[0]) menuItems[0].lastChild.textContent = ' ' + t('addFiles');
        if (menuItems[1]) menuItems[1].lastChild.textContent = ' ' + t('takePhoto');
        if (menuItems[2]) menuItems[2].lastChild.textContent = ' ' + t('takeScreenshot');
        document.getElementById('disclaimer').textContent = t('disclaimer');
        // Re-render messages to update sender labels
        renderMessages();
        renderChatList();
    }

    // ── Markdown setup ──
    marked.setOptions({
        highlight: (code, lang) => {
            if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
            return hljs.highlightAuto(code).value;
        },
        breaks: true,
        gfm: true
    });
    function renderMd(text) {
        return DOMPurify.sanitize(marked.parse(text), { ADD_TAGS: ['code','pre','span'], ADD_ATTR: ['class'] });
    }

    // ── Chat CRUD ──
    function saveChats() { localStorage.setItem('linkAiChats', JSON.stringify(allChats)); }

    function createNewChat() {
        const chat = {
            id: Date.now().toString(),
            title: 'New chat',
            messages: [],
            createdAt: new Date().toISOString()
        };
        allChats.unshift(chat);
        saveChats();
        switchToChat(chat.id);
        renderChatList();
        closeSidebarMobile();
    }

    function deleteChat(id, e) {
        e.stopPropagation();
        allChats = allChats.filter(c => c.id !== id);
        saveChats();
        if (activeChatId === id) {
            if (allChats.length > 0) switchToChat(allChats[0].id);
            else { activeChatId = null; topbarTitle.textContent = 'New chat'; renderMessages(); }
        }
        renderChatList();
    }

    function startRename(id, e) {
        e.stopPropagation();
        const item = document.querySelector(`[data-chat-id="${id}"]`);
        const titleEl = item.querySelector('.chat-item-title');
        const chat = allChats.find(c => c.id === id);
        titleEl.outerHTML = `<input class="rename-input" value="${chat.title.replace(/"/g, '&quot;')}" onblur="finishRename('${id}', this)" onkeydown="if(event.key==='Enter')this.blur()">`;
        item.querySelector('.rename-input').focus();
        item.querySelector('.rename-input').select();
    }

    function finishRename(id, input) {
        const chat = allChats.find(c => c.id === id);
        if (chat) {
            chat.title = input.value.trim() || chat.title;
            if (chat.id === activeChatId) topbarTitle.textContent = chat.title;
            saveChats();
        }
        renderChatList();
    }

    // ── Topbar title rename ──
    function startTopbarRename() {
        if (!activeChatId) return;
        const chat = allChats.find(c => c.id === activeChatId);
        if (!chat) return;
        topbarTitleArea.innerHTML = `<input class="topbar-rename-input" id="topbarRenameInput" value="${chat.title.replace(/"/g, '&quot;')}" onblur="finishTopbarRename()" onkeydown="if(event.key==='Enter')this.blur(); if(event.key==='Escape'){this.dataset.cancel='1';this.blur();}">`;
        const inp = document.getElementById('topbarRenameInput');
        inp.focus();
        inp.select();
    }

    function finishTopbarRename() {
        const inp = document.getElementById('topbarRenameInput');
        if (!inp) return;
        const chat = allChats.find(c => c.id === activeChatId);
        if (chat && inp.dataset.cancel !== '1') {
            const val = inp.value.trim();
            if (val) chat.title = val;
            saveChats();
            renderChatList();
        }
        // Restore normal title area
        topbarTitleArea.innerHTML = `
            <span class="topbar-title" id="topbarTitle">${DOMPurify.sanitize(chat ? chat.title : 'New chat')}</span>
            <button class="topbar-rename-btn" onclick="startTopbarRename()" title="Rename chat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>`;
    }

    function switchToChat(id) {
        activeChatId = id;
        const chat = allChats.find(c => c.id === id);
        topbarTitle.textContent = chat ? chat.title : 'New chat';
        renderMessages();
        renderChatList();
    }

    function getActiveChat() { return allChats.find(c => c.id === activeChatId); }

    // ── Render chat list ──
    function renderChatList() {
        const query = searchInput.value.toLowerCase();
        const filtered = allChats.filter(c =>
            c.title.toLowerCase().includes(query) ||
            c.messages.some(m => m.content.toLowerCase().includes(query))
        );

        const groups = {};
        const today = new Date().toDateString();
        const yesterday = new Date(Date.now() - 86400000).toDateString();

        filtered.forEach(chat => {
            const d = new Date(chat.createdAt).toDateString();
            let label;
            if (d === today) label = t('today');
            else if (d === yesterday) label = t('yesterday');
            else label = new Date(chat.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            if (!groups[label]) groups[label] = [];
            groups[label].push(chat);
        });

        let html = '';
        for (const [label, chats] of Object.entries(groups)) {
            html += `<div class="date-group-label">${label}</div>`;
            chats.forEach(chat => {
                const active = chat.id === activeChatId ? 'active' : '';
                html += `
                <div class="chat-item ${active}" data-chat-id="${chat.id}" onclick="switchToChat('${chat.id}'); closeSidebarMobile()">
                    <span class="chat-item-title">${DOMPurify.sanitize(chat.title)}</span>
                    <div class="chat-item-actions">
                        <button onclick="startRename('${chat.id}', event)" title="Rename">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button onclick="deleteChat('${chat.id}', event)" title="Delete">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                        </button>
                    </div>
                </div>`;
            });
        }
        chatListEl.innerHTML = html || `<div style="padding:20px;text-align:center;color:#555;font-size:13px">${t('noChats')}</div>`;
    }

    // ── SVG icons ──
    const ICON_COPY = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
    const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    const ICON_EDIT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';

    // ── Render messages ──
    function renderMessages() {
        const chat = getActiveChat();
        if (!chat || chat.messages.length === 0) {
            messagesEl.innerHTML = '';
            messagesEl.appendChild(welcomeEl);
            welcomeEl.style.display = 'flex';
            return;
        }
        welcomeEl.style.display = 'none';
        let html = '';
        chat.messages.forEach((msg, idx) => {
            const isUser = msg.role === 'user';
            const sender = isUser ? t('you') : t('linkAi');
            const body = isUser
                ? DOMPurify.sanitize(msg.content).replace(/\n/g, '<br>')
                : renderMd(msg.content);
            const editBtn = isUser
                ? `<button class="msg-action-btn" onclick="startEditMessage(${idx})" title="Edit">${ICON_EDIT}</button>`
                : '';
            html += `
            <div class="message-row ${msg.role}" data-msg-idx="${idx}">
                <div class="message-sender">${sender}</div>
                <div class="message-body">${body}</div>
                <div class="message-actions">
                    ${editBtn}
                    <button class="msg-action-btn copy-btn" data-idx="${idx}" title="Copy">${ICON_COPY}</button>
                </div>
            </div>`;
        });
        messagesEl.innerHTML = html;
        // Bind copy buttons
        messagesEl.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const i = parseInt(btn.dataset.idx);
                const text = chat.messages[i]?.content || '';
                navigator.clipboard.writeText(text).then(() => {
                    btn.innerHTML = ICON_CHECK;
                    setTimeout(() => { btn.innerHTML = ICON_COPY; }, 1500);
                });
            });
        });
        addCodeCopyButtons(messagesEl);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addCodeCopyButtons(container) {
        container.querySelectorAll('pre').forEach(pre => {
            const btn = document.createElement('button');
            btn.className = 'code-copy-btn';
            btn.innerHTML = ICON_COPY;
            btn.style.display = 'flex';
            btn.style.alignItems = 'center';
            btn.onclick = () => {
                const code = pre.querySelector('code');
                navigator.clipboard.writeText(code ? code.textContent : pre.textContent).then(() => {
                    btn.innerHTML = ICON_CHECK;
                    setTimeout(() => { btn.innerHTML = ICON_COPY; }, 1500);
                });
            };
            pre.style.position = 'relative';
            pre.appendChild(btn);
        });
    }

    // ── Edit message ──
    function startEditMessage(idx) {
        const chat = getActiveChat();
        if (!chat) return;
        const row = messagesEl.querySelector(`[data-msg-idx="${idx}"]`);
        if (!row) return;
        const content = chat.messages[idx].content;
        row.querySelector('.message-body').outerHTML = `<textarea class="edit-textarea" id="editArea">${DOMPurify.sanitize(content)}</textarea>`;
        row.querySelector('.message-actions').outerHTML = `
            <div class="edit-actions">
                <button class="edit-save" onclick="saveEditMessage(${idx})">${t('saveSubmit')}</button>
                <button class="edit-cancel" onclick="renderMessages()">${t('cancel')}</button>
            </div>`;
        const ta = document.getElementById('editArea');
        ta.style.height = ta.scrollHeight + 'px';
        ta.focus();
    }

    function saveEditMessage(idx) {
        const chat = getActiveChat();
        if (!chat) return;
        const ta = document.getElementById('editArea');
        const newContent = ta.value.trim();
        if (!newContent) return;
        // Update message and remove everything after it
        chat.messages[idx].content = newContent;
        chat.messages = chat.messages.slice(0, idx + 1);
        saveChats();
        renderMessages();
        // Resend to get new response
        sendBtn.disabled = true;
        messageInput.disabled = true;
        showTyping();
        const history = chat.messages.map(m => ({
            role: m.role === 'user' ? 'user' : 'assistant',
            content: m.content
        }));
        fetch('/chat/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: newContent, conversation_history: history, language: currentLang })
        }).then(async res => {
            if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Server error'); }
            const row = document.createElement('div');
            row.className = 'message-row assistant';
            row.innerHTML = `<div class="message-sender">${t('linkAi')}</div><div class="message-body"></div>`;
            const typingRow = document.getElementById('typingRow');
            if (typingRow) messagesEl.insertBefore(row, typingRow);
            else messagesEl.appendChild(row);
            const bodyEl = row.querySelector('.message-body');
            let fullText = '';
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const payload = JSON.parse(line.slice(6));
                            if (payload.error) throw new Error(payload.error);
                            if (payload.text) { fullText += payload.text; bodyEl.innerHTML = renderMd(fullText); messagesEl.scrollTop = messagesEl.scrollHeight; }
                        } catch (e) { if (!e.message.includes('JSON')) throw e; }
                    }
                }
            }
            removeTyping();
            bodyEl.innerHTML = renderMd(fullText);
            addCodeCopyButtons(bodyEl);
            chat.messages.push({ role: 'assistant', content: fullText });
            saveChats();
        }).catch(err => {
            removeTyping();
            const errRow = document.createElement('div');
            errRow.className = 'message-row assistant';
            errRow.innerHTML = `<div class="error-msg">${DOMPurify.sanitize(err.message)}</div>`;
            messagesEl.appendChild(errRow);
        }).finally(() => {
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        });
    }

    // ── Loading animation ──
    function showTyping() {
        const div = document.createElement('div');
        div.className = 'message-row assistant';
        div.id = 'typingRow';
        div.innerHTML = `
            <div class="loading-container">
                <img src="/loading_transparent.apng" alt="" width="100" height="100">
            </div>`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    function removeTyping() {
        const el = document.getElementById('typingRow');
        if (el) el.remove();
    }

    // ── Auto-title from first message ──
    function autoTitle(message) {
        const chat = getActiveChat();
        if (chat && chat.title === 'New chat' && chat.messages.length <= 1) {
            chat.title = message.length > 40 ? message.slice(0, 40) + '...' : message;
            topbarTitle.textContent = chat.title;
            saveChats();
            renderChatList();
        }
    }

    // ── Send message ──
    async function sendMessage() {
        const message = messageInput.value.trim();
        const fileToSend = selectedFile;
        if (!message && !fileToSend) return;

        if (!activeChatId) createNewChat();
        const chat = getActiveChat();
        welcomeEl.style.display = 'none';

        const userText = fileToSend
            ? `${fileToSend.name}${message ? '\n' + message : ''}`
            : message;
        chat.messages.push({ role: 'user', content: userText });
        autoTitle(message || fileToSend.name);
        saveChats();
        renderMessages();

        messageInput.value = '';
        messageInput.style.height = 'auto';
        removeFilePreview();

        sendBtn.disabled = true;
        messageInput.disabled = true;
        showTyping();

        const history = chat.messages.map(m => ({
            role: m.role === 'user' ? 'user' : 'assistant',
            content: m.content
        }));

        try {
            if (fileToSend) {
                const formData = new FormData();
                formData.append('file', fileToSend);
                formData.append('message', message);
                formData.append('conversation_history', JSON.stringify(history));
                formData.append('language', currentLang);
                const res = await fetch('/chat', { method: 'POST', body: formData });
                const data = await res.json();
                removeTyping();
                if (data.error) throw new Error(data.error);
                chat.messages.push({ role: 'assistant', content: data.response });
                saveChats();
                renderMessages();
            } else {
                const res = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, conversation_history: history, language: currentLang })
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Server error');
                }

                const row = document.createElement('div');
                row.className = 'message-row assistant';
                row.innerHTML = `<div class="message-sender">${t('linkAi')}</div><div class="message-body"></div>`;
                // Insert response row BEFORE the typing indicator
                const typingRow = document.getElementById('typingRow');
                if (typingRow) messagesEl.insertBefore(row, typingRow);
                else messagesEl.appendChild(row);
                const bodyEl = row.querySelector('.message-body');

                let fullText = '';
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const payload = JSON.parse(line.slice(6));
                                if (payload.error) throw new Error(payload.error);
                                if (payload.text) {
                                    fullText += payload.text;
                                    bodyEl.innerHTML = renderMd(fullText);
                                    messagesEl.scrollTop = messagesEl.scrollHeight;
                                }
                            } catch (e) { if (!e.message.includes('JSON')) throw e; }
                        }
                    }
                }

                removeTyping();
                bodyEl.innerHTML = renderMd(fullText);
                addCodeCopyButtons(bodyEl);
                chat.messages.push({ role: 'assistant', content: fullText });
                saveChats();
            }
        } catch (err) {
            removeTyping();
            const errRow = document.createElement('div');
            errRow.className = 'message-row assistant';
            errRow.innerHTML = `<div class="error-msg">${DOMPurify.sanitize(err.message)}</div>`;
            messagesEl.appendChild(errRow);
        } finally {
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }
    }

    // ── Attach menu ──
    const attachMenu = document.getElementById('attachMenu');

    function toggleAttachMenu() {
        attachMenu.classList.toggle('open');
    }
    function closeAttachMenu() {
        attachMenu.classList.remove('open');
    }
    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.attach-wrap')) closeAttachMenu();
    });

    function pickFile() {
        closeAttachMenu();
        fileInput.click();
    }

    async function takeScreenshot() {
        closeAttachMenu();
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: { mediaSource: 'screen' } });
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();
            // Wait a frame for the video to render
            await new Promise(r => requestAnimationFrame(r));
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            stream.getTracks().forEach(t => t.stop());
            canvas.toBlob(blob => {
                if (blob) {
                    const file = new File([blob], 'screenshot.png', { type: 'image/png' });
                    selectedFile = file;
                    filePreview.innerHTML = `<img src="${URL.createObjectURL(blob)}" style="height:40px;border-radius:4px;margin-right:8px"><span>screenshot.png</span> <button onclick="removeFilePreview()" style="background:none;border:none;color:#f88;cursor:pointer;margin-left:8px;font-size:14px">&times;</button>`;
                    filePreview.style.display = 'flex';
                    filePreview.style.alignItems = 'center';
                }
            }, 'image/png');
        } catch (err) {
            // User cancelled or permission denied — do nothing
            console.log('Screenshot cancelled');
        }
    }

    async function takePhoto() {
        closeAttachMenu();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            // Create fullscreen camera overlay
            const overlay = document.createElement('div');
            overlay.id = 'cameraOverlay';
            overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;';
            const video = document.createElement('video');
            video.srcObject = stream;
            video.autoplay = true;
            video.playsInline = true;
            video.style.cssText = 'max-width:100%;max-height:80vh;border-radius:12px;';
            const btnRow = document.createElement('div');
            btnRow.style.cssText = 'display:flex;gap:16px;margin-top:16px;';
            const captureBtn = document.createElement('button');
            captureBtn.textContent = 'Capture';
            captureBtn.style.cssText = 'padding:12px 32px;background:#6366f1;color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-family:Inter,sans-serif;';
            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Cancel';
            cancelBtn.style.cssText = 'padding:12px 32px;background:#333;color:#ccc;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-family:Inter,sans-serif;';
            btnRow.append(captureBtn, cancelBtn);
            overlay.append(video, btnRow);
            document.body.appendChild(overlay);

            await video.play();

            const cleanup = () => { stream.getTracks().forEach(t => t.stop()); overlay.remove(); };
            cancelBtn.onclick = cleanup;
            captureBtn.onclick = () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                cleanup();
                canvas.toBlob(blob => {
                    if (blob) {
                        const file = new File([blob], 'photo.png', { type: 'image/png' });
                        selectedFile = file;
                        filePreview.innerHTML = `<img src="${URL.createObjectURL(blob)}" style="height:40px;border-radius:4px;margin-right:8px"><span>photo.png</span> <button onclick="removeFilePreview()" style="background:none;border:none;color:#f88;cursor:pointer;margin-left:8px;font-size:14px">&times;</button>`;
                        filePreview.style.display = 'flex';
                        filePreview.style.alignItems = 'center';
                    }
                }, 'image/png');
            };
        } catch (err) {
            console.log('Camera cancelled or not available');
        }
    }

    // ── File upload ──
    fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) {
            selectedFile = e.target.files[0];
            const isImage = selectedFile.type.startsWith('image/');
            const thumb = isImage ? `<img src="${URL.createObjectURL(selectedFile)}" style="height:40px;border-radius:4px;margin-right:8px">` : '';
            filePreview.innerHTML = `${thumb}<span>${selectedFile.name}</span> <button onclick="removeFilePreview()" style="background:none;border:none;color:#f88;cursor:pointer;margin-left:8px;font-size:14px">&times;</button>`;
            filePreview.style.display = 'flex';
            filePreview.style.alignItems = 'center';
        }
    });
    function removeFilePreview() {
        selectedFile = null;
        fileInput.value = '';
        filePreview.style.display = 'none';
        filePreview.innerHTML = '';
    }

    // ── Input helpers ──
    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }
    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 200) + 'px';
    }

    // ── Voice input (MediaRecorder + Gemini transcription) ──
    const voiceBtn = document.getElementById('voiceBtn');
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let audioStream = null;

    function toggleVoice() {
        if (isRecording) {
            stopVoice();
        } else {
            startVoice();
        }
    }

    async function startVoice() {
        try {
            audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (err) {
            alert('Microphone access denied. Please allow microphone access in your browser settings and try again.');
            return;
        }

        audioChunks = [];
        // Prefer webm/opus, fall back to whatever the browser supports
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
            ? 'audio/webm;codecs=opus'
            : MediaRecorder.isTypeSupported('audio/webm')
                ? 'audio/webm'
                : 'audio/mp4';

        try {
            mediaRecorder = new MediaRecorder(audioStream, { mimeType });
        } catch (e) {
            mediaRecorder = new MediaRecorder(audioStream);
        }

        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = async () => {
            // Stop all tracks
            audioStream.getTracks().forEach(t => t.stop());
            audioStream = null;

            if (audioChunks.length === 0) return;

            const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
            audioChunks = [];

            // Show transcribing state
            messageInput.placeholder = 'Transcribing...';
            messageInput.disabled = true;
            voiceBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('audio', audioBlob, 'voice.webm');
                formData.append('language', currentLang);

                const res = await fetch('/transcribe', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.error) throw new Error(data.error);

                if (data.text) {
                    const existing = messageInput.value;
                    messageInput.value = existing + (existing ? ' ' : '') + data.text;
                    autoResize(messageInput);
                }
            } catch (err) {
                console.error('Transcription failed:', err);
                // Fallback: show error inline
                const existing = messageInput.value;
                if (!existing) messageInput.placeholder = 'Voice transcription failed. Please type instead.';
            } finally {
                messageInput.disabled = false;
                voiceBtn.disabled = false;
                messageInput.placeholder = t('placeholder');
                messageInput.focus();
            }
        };

        mediaRecorder.start(250); // collect data every 250ms
        isRecording = true;
        voiceBtn.classList.add('recording');
        messageInput.placeholder = t('listening');
    }

    function stopVoice() {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
        }
        isRecording = false;
        voiceBtn.classList.remove('recording');
    }

    // ── Sidebar toggle ──
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        sidebar.classList.toggle('hidden');
        overlay.classList.toggle('show');
    }
    function closeSidebarMobile() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        sidebar.classList.add('hidden');
        overlay.classList.remove('show');
    }
    // Close sidebar when tapping anywhere outside it (but not the toggle button)
    document.querySelector('.main').addEventListener('click', function(e) {
        if (e.target.closest('.topbar-btn[onclick*="toggleSidebar"]')) return;
        const sidebar = document.getElementById('sidebar');
        if (!sidebar.classList.contains('hidden')) {
            closeSidebarMobile();
        }
    });

    // ── Theme ──
    function toggleTheme() {
        const isLight = document.body.classList.toggle('light-theme');
        localStorage.setItem('linkAiTheme', isLight ? 'light' : 'dark');
        // Swap highlight.js theme
        document.getElementById('hljs-dark').disabled = isLight;
        document.getElementById('hljs-light').disabled = !isLight;
        // Swap icon
        document.getElementById('themeIcon').innerHTML = isLight
            ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
            : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    }

    // Load saved theme on startup
    (function initTheme() {
        const saved = localStorage.getItem('linkAiTheme');
        if (saved === 'light') {
            document.body.classList.add('light-theme');
            document.getElementById('hljs-dark').disabled = true;
            document.getElementById('hljs-light').disabled = false;
            document.getElementById('themeIcon').innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
        }
    })();

    // ── Auth ──
    auth.onAuthStateChanged((user) => {
        if (!user) localStorage.setItem('guestMode', 'true');
    });

    // ── Init ──
    if (allChats.length > 0) {
        activeChatId = allChats[0].id;
        topbarTitle.textContent = allChats[0].title;
    }
    // Show sidebar on desktop, keep hidden on mobile
    if (window.innerWidth > 768) {
        document.getElementById('sidebar').classList.remove('hidden');
    }
    applyLanguage();
    messageInput.focus();

    // Handle starter prompt from welcome page
    const starterPrompt = localStorage.getItem('enkuStarterPrompt');
    if (starterPrompt) {
        localStorage.removeItem('enkuStarterPrompt');
        messageInput.value = starterPrompt;
        // Auto-send after a brief delay so the UI is ready
        setTimeout(() => sendMessage(), 300);
    }
    </script>
