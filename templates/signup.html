<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ENKU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0e0;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size:
                50px 50px,
                50px 50px,
                10px 10px,
                10px 10px;
            background-position:
                0 0,
                0 0,
                0 0,
                0 0;
            pointer-events: none;
            z-index: -1;
            opacity: 0.3;
        }

        /* Right Dock with Frame Styling */
        .right-dock {
            align-items: center;
            background: transparent;
            border-radius: 99px;
            box-shadow: inset 1px 1px 2px #ffffff4c, inset -2px -2px 2px #ffffff1a, inset 0px 0px 8px #ffffff4c;
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            display: flex;
            gap: 10px;
            height: 77px;
            justify-content: center;
            overflow: hidden;
            padding: 8px 16px 8px 0px;
            position: fixed;
            top: 12px;
            right: 20px;
            width: 120px;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .right-dock:hover {
            box-shadow: inset 1px 1px 3px #ffffff5c, inset -2px -2px 3px #ffffff2a, inset 0px 0px 10px #ffffff5c;
        }

        body.light-theme .right-dock {
            background: transparent;
            box-shadow: inset 1px 1px 2px #ffffff6c, inset -2px -2px 2px #ffffff3a, inset 0px 0px 8px #ffffff6c;
        }

        body.light-theme .right-dock:hover {
            box-shadow: inset 1px 1px 3px #ffffff7c, inset -2px -2px 3px #ffffff4a, inset 0px 0px 10px #ffffff7c;
        }

        .theme-toggle {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .theme-toggle:hover svg {
            transform: rotate(30deg);
        }

        body.light-theme .theme-toggle {
            color: #333;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        body.light-theme .theme-toggle:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .auth-container {
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }

        .signup-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .signup-header h1 {
            font-size: 2rem;
            color: var(--google-blue, #4285F4);
            margin-bottom: 0.5rem;
        }

        .signup-header p {
            color: #888;
        }

        .signup-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-group {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--google-blue, #4285F4);
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        .form-group input::placeholder {
            color: #888;
        }

        .signup-button {
            background: linear-gradient(45deg, var(--google-blue, #4285F4), #3367D6);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .signup-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3);
        }

        .signup-button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .signin-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #888;
        }

        .signin-link a {
            color: var(--google-blue, #4285F4);
            text-decoration: none;
            font-weight: 500;
        }

        .signin-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: var(--google-red, #EA4335);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            text-align: center;
            padding: 0.5rem;
            background: rgba(234, 67, 53, 0.1);
            border-radius: 4px;
            display: none;
        }

        .success-message {
            color: var(--google-green, #34A853);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            text-align: center;
            padding: 0.5rem;
            background: rgba(52, 168, 83, 0.1);
            border-radius: 4px;
            display: none;
        }

        .loading {
            position: relative;
            pointer-events: none;
        }

        .loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin: -10px 0 0 -10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Verification step styles */
        .verification-step {
            display: none;
        }

        .verification-icon {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .verification-icon svg {
            width: 64px;
            height: 64px;
            color: var(--google-blue, #4285F4);
        }

        .verification-info {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .verification-info .email-highlight {
            color: var(--google-blue, #4285F4);
            font-weight: 500;
        }

        .code-input-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .code-input-group input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #e0e0e0;
            transition: all 0.3s ease;
        }

        .code-input-group input:focus {
            outline: none;
            border-color: var(--google-blue, #4285F4);
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        .code-input-group input.filled {
            border-color: var(--google-blue, #4285F4);
            background: rgba(66, 133, 244, 0.05);
        }

        .resend-link {
            text-align: center;
            margin-top: 1rem;
            color: #888;
            font-size: 0.9rem;
        }

        .resend-link a {
            color: var(--google-blue, #4285F4);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .resend-link a:hover {
            text-decoration: underline;
        }

        .resend-link a.disabled {
            color: #666;
            cursor: not-allowed;
            pointer-events: none;
        }

        .back-link {
            text-align: center;
            margin-top: 1rem;
            color: #888;
            font-size: 0.9rem;
        }

        .back-link a {
            color: var(--google-blue, #4285F4);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        /* Light theme styles */
        body.light-theme {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            color: #333;
        }

        body.light-theme::before {
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.1) 1px, transparent 1px),
                linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            opacity: 0.4;
        }

        body.light-theme .signup-header h1 {
            color: var(--google-blue, #4285F4);
        }

        body.light-theme .signup-header p {
            color: #666;
        }

        body.light-theme .form-group input {
            background: transparent;
            color: #333;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        body.light-theme .form-group input::placeholder {
            color: #888;
        }

        body.light-theme .signup-button {
            background: linear-gradient(45deg, var(--google-blue, #4285F4), #3367D6);
        }

        body.light-theme .signin-link {
            color: #666;
        }

        body.light-theme .signin-link a {
            color: var(--google-blue, #4285F4);
        }

        body.light-theme .error-message {
            background: rgba(234, 67, 53, 0.1);
        }

        body.light-theme .success-message {
            background: rgba(52, 168, 83, 0.1);
        }

        body.light-theme .loading::after {
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-top-color: var(--google-blue, #4285F4);
        }

        body.light-theme .code-input-group input {
            background: transparent;
            color: #333;
            border: 1px solid rgba(0, 0, 0, 0.15);
        }

        body.light-theme .code-input-group input.filled {
            background: rgba(66, 133, 244, 0.05);
        }

        body.light-theme .verification-info {
            color: #666;
        }
    </style>
</head>
<body>

    <!-- Right Dock -->
    <div class="right-dock">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3ZM12 19C8.13401 19 5 15.866 5 12C5 8.13401 8.13401 5 12 5C15.866 5 19 8.13401 19 12C19 15.866 15.866 19 12 19Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 1V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 21V23" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4.22 4.22L5.64 5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M18.36 18.36L19.78 19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M1 12H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M21 12H23" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4.22 19.78L5.64 18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M18.36 5.64L19.78 4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>

    <div class="auth-container">
        <!-- Step 1: Sign Up Form -->
        <div id="signup-step">
            <div class="signup-header">
                <h1>Create Account</h1>
                <p>Join ENKU and start chatting</p>
            </div>

            <form class="signup-form" id="signup-form">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="signup-button" id="signup-button">Sign Up</button>
                <div class="error-message" id="error-message"></div>
            </form>

            <div class="signin-link">
                Already have an account? <a href="/signin">Sign In</a>
            </div>
        </div>

        <!-- Step 2: Email Verification -->
        <div id="verification-step" class="verification-step">
            <div class="signup-header">
                <h1>Verify Email</h1>
                <p>We sent a verification code to your email</p>
            </div>

            <div class="verification-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 4H20C21.1 4 22 4.9 22 6V18C22 19.1 21.1 20 20 20H4C2.9 20 2 19.1 2 18V6C2 4.9 2.9 4 4 4Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M22 6L12 13L2 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <div class="verification-info">
                Enter the 6-digit code sent to<br>
                <span class="email-highlight" id="verification-email"></span>
            </div>

            <div class="code-input-group" id="code-inputs">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            </div>

            <button class="signup-button" id="verify-button" onclick="verifyCode()" disabled>Verify & Continue</button>
            <div class="error-message" id="verify-error"></div>
            <div class="success-message" id="verify-success">Email verified! Redirecting...</div>

            <div class="resend-link">
                Didn't receive the code? <a id="resend-link" onclick="resendCode()">Resend Code</a>
            </div>

            <div class="back-link">
                <a onclick="goBack()">Back to Sign Up</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="{{ url_for('static', filename='firebase-config.js') }}"></script>
    <script>
        // Initialize Firebase
        const auth = firebase.auth();
        const signupForm = document.getElementById('signup-form');
        const signupButton = document.getElementById('signup-button');
        const errorMessage = document.getElementById('error-message');

        let pendingUsername = '';
        let pendingEmail = '';
        let resendCooldown = false;

        // Check if user is already signed in and verified
        auth.onAuthStateChanged((user) => {
            if (user && user.emailVerified) {
                window.location.href = '/welcome';
            }
        });

        // Code input handling
        const codeInputs = document.querySelectorAll('#code-inputs input');
        codeInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const val = e.target.value.replace(/[^0-9]/g, '');
                e.target.value = val;

                if (val && index < codeInputs.length - 1) {
                    codeInputs[index + 1].focus();
                }

                if (val) {
                    e.target.classList.add('filled');
                } else {
                    e.target.classList.remove('filled');
                }

                // Enable verify button when all 6 digits entered
                const code = getCode();
                document.getElementById('verify-button').disabled = code.length !== 6;
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    codeInputs[index - 1].focus();
                    codeInputs[index - 1].value = '';
                    codeInputs[index - 1].classList.remove('filled');
                }
                if (e.key === 'Enter') {
                    const code = getCode();
                    if (code.length === 6) verifyCode();
                }
            });

            // Handle paste
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
                for (let i = 0; i < Math.min(pasted.length, 6); i++) {
                    codeInputs[i].value = pasted[i];
                    codeInputs[i].classList.add('filled');
                }
                const focusIdx = Math.min(pasted.length, 5);
                codeInputs[focusIdx].focus();
                document.getElementById('verify-button').disabled = pasted.length < 6;
            });
        });

        function getCode() {
            return Array.from(codeInputs).map(i => i.value).join('');
        }

        // Form submission - Step 1
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            pendingUsername = document.getElementById('username').value;
            pendingEmail = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                signupButton.disabled = true;
                signupButton.classList.add('loading');
                signupButton.textContent = '';
                errorMessage.style.display = 'none';

                // Create user with Firebase
                const userCredential = await auth.createUserWithEmailAndPassword(pendingEmail, password);

                // Update profile with username
                await userCredential.user.updateProfile({
                    displayName: pendingUsername
                });

                // Send verification code via backend
                const response = await fetch('/send-verification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to send verification code');
                }

                // Show verification step
                showVerificationStep();

            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
                signupButton.disabled = false;
                signupButton.classList.remove('loading');
                signupButton.textContent = 'Sign Up';
            }
        });

        function showVerificationStep() {
            document.getElementById('signup-step').style.display = 'none';
            document.getElementById('verification-step').style.display = 'block';
            document.getElementById('verification-email').textContent = pendingEmail;
            codeInputs[0].focus();
        }

        // Verify the code - Step 2
        async function verifyCode() {
            const code = getCode();
            if (code.length !== 6) return;

            const verifyButton = document.getElementById('verify-button');
            const verifyError = document.getElementById('verify-error');
            const verifySuccess = document.getElementById('verify-success');

            try {
                verifyButton.disabled = true;
                verifyButton.classList.add('loading');
                verifyButton.textContent = '';
                verifyError.style.display = 'none';

                const response = await fetch('/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail, code: code })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Invalid verification code');
                }

                // Success
                verifySuccess.style.display = 'block';
                setTimeout(() => {
                    window.location.href = '/welcome';
                }, 1500);

            } catch (error) {
                verifyError.textContent = error.message;
                verifyError.style.display = 'block';
                verifyButton.disabled = false;
                verifyButton.classList.remove('loading');
                verifyButton.textContent = 'Verify & Continue';

                // Clear code inputs
                codeInputs.forEach(input => {
                    input.value = '';
                    input.classList.remove('filled');
                });
                codeInputs[0].focus();
            }
        }

        // Resend verification code
        async function resendCode() {
            if (resendCooldown) return;

            const resendLink = document.getElementById('resend-link');
            const verifyError = document.getElementById('verify-error');

            try {
                resendCooldown = true;
                resendLink.classList.add('disabled');
                resendLink.textContent = 'Sending...';
                verifyError.style.display = 'none';

                const response = await fetch('/send-verification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to resend code');
                }

                // Show cooldown timer
                let seconds = 60;
                resendLink.textContent = `Resend in ${seconds}s`;
                const timer = setInterval(() => {
                    seconds--;
                    resendLink.textContent = `Resend in ${seconds}s`;
                    if (seconds <= 0) {
                        clearInterval(timer);
                        resendLink.textContent = 'Resend Code';
                        resendLink.classList.remove('disabled');
                        resendCooldown = false;
                    }
                }, 1000);

            } catch (error) {
                verifyError.textContent = error.message;
                verifyError.style.display = 'block';
                resendLink.textContent = 'Resend Code';
                resendLink.classList.remove('disabled');
                resendCooldown = false;
            }
        }

        // Go back to sign up form
        function goBack() {
            // Delete the unverified user
            const user = auth.currentUser;
            if (user) {
                user.delete().catch(() => {});
            }
            document.getElementById('verification-step').style.display = 'none';
            document.getElementById('signup-step').style.display = 'block';
            signupButton.disabled = false;
            signupButton.classList.remove('loading');
            signupButton.textContent = 'Sign Up';
        }

        // Theme management
        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.toggle('light-theme');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const themeToggle = document.getElementById('themeToggle');
            const isLight = document.body.classList.contains('light-theme');
            themeToggle.innerHTML = isLight ?
                `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>` :
                `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
